<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>{ytcms:$WebTitle}-{ytcms-Video-List:Title}</title>
		<meta name="author" content="{ytcms:$WebTitle}">
		<meta name="keywords" content="{ytcms:$WebKeywords},{ytcms-Video-List:Title}">
		<meta name="description" content="{ytcms:$WebDescription},{ytcms-Video-List:Title}">
		<link rel="stylesheet" href="{ytcms:$StylePath}/css/app.css" />
	</head>
	<body>
		{ytcms-include:Header}
		<div class="max">
			<div class="content">
				{ytcms-TAd}
				<p style="margin:5px 0;"><a href="{ytcms-TAd:Url}" target="_blank"><img src="{ytcms-TAd:Pic}" style="width:{ytcms-TAd:Width};height:{ytcms-TAd:Height};"></a></p>
				{/ytcms-TAd}
				<div class="condition">
					<div class="yt-spin video_box">
						<div class="video-box">
							{ytcms-Video-List:Count=30}
							<div class="video-item">
								<div class="img-box">
									<a href="{ytcms-Video-List:DUrl}">
										<img class="nature" src="{ytcms-Video-List:Pic}" alt="{ytcms-Video-List:Name}" />
									</a>
								</div>
								<div class="txt-ellipsis-2">
									<a href="{ytcms-Video-List:DUrl}"><h3>{ytcms-Video-List:Name}</h3></a>
								</div>
							</div>
							{/ytcms-Video-List}
						</div>
					</div>
					<div class="pagination" id="wr-page">
						<script src="{ytcms:$StylePath}/js/jQuery.js"></script>
						<script src="{ytcms:$StylePath}/js/page.js?t=1"></script>
						<script type="text/javascript">
							$("#wr-page").wrpage({
								pagesize: '{ytcms-Video-List:totalPage}',
								wr_current: '{ytcms-Video-List:currentPage}',
								baseUrl: '{ytcms-Video-List:baseUrl}',
							})
						</script>
					</div>
				</div>
			</div>
		</div>
		{ytcms-include:Footer}
	</body>
</html>

<style>
	.pagination {
		height: 32px;
		line-height: 32px;
		margin-bottom: 20px;
		margin-top: 20px;
		text-align: center
	}
	
	.pagination a {
		background-color: #f1f1f1;
		color: #777;
		display: inline-block;
		margin-right: 2px;
		padding: 0 12px
	}
	
	.pagination a:hover,
	.pagination strong {
		background-color: #ff5757;
		color: #fff;
		text-shadow: 1px 1px 1px #ff5757
	}
	
	.pagination strong {
		display: inline-block;
		font-weight: 400;
		height: 32px;
		line-height: 32px;
		margin-right: 2px;
		padding: 0 12px
	}
	
	.pagination a,
	.pagination strong {
		border-radius: 3px
	}
	
	@media (min-width:769px) {
		.pagination a.hidden-xs {
			display: inline-block
		}
	
		.pagination a.visible-xs {
			display: none
		}
	}
	
	@media (max-width:769px) {
		.pagination a.hidden-xs {
			display: none
		}
	
		.pagination a.visible-xs {
			display: inline-block
		}
	}
	
	@media (max-width:328px) {
		.pagination a {
			background-color: #f1f1f1;
			color: #777;
			display: inline-block;
			margin-right: 2px;
			padding: 0 10px
		}
	}
</style>
