<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="renderer" content="webkit">
		<meta name="applicable-device" content="pc,mobile">
		<title>{ytcms:$WebTitle}-{ytcms-Search-List:Title}</title>
		<meta name="author" content="{ytcms:$WebTitle}">
		<meta name="keywords" content="{ytcms:$WebKeywords},{ytcms-Search-List:Title}">
		<meta name="description" content="{ytcms:$WebDescription},{ytcms-Search-List:Title}">
		<link rel="stylesheet" href="{ytcms:$StylePath}/css/style.css" />
		<link rel="stylesheet" href="{ytcms:$StylePath}/css/new.css" />
	</head>
	<body>
		<div class="page unselect">
			<div class="ts-wrap">
				<div class="Utop">
					{ytcms-include:Header}
				</div>
				{ytcms-TAd}
				<p style="margin:10px 0;"><a href="{ytcms-TAd:Url}" target="_blank"><img style="width:{ytcms-TAd:Width};height:{ytcms-TAd:Height};margin-bottom:2px;" src="{ytcms-TAd:Pic}"></a></p>
				{/ytcms-TAd}
			</div>
			<div class="wrapper">
				<div class="ts-wrap">
					<div class="UStop">
						<h5>{ytcms-Search-List:Title}</h5>
					</div>
					<ul class="cate-section">
						{ytcms-Search-List:Count=10}
						<li class="article" style="width: 46%;">
							<a href="{ytcms-Video-List:DUrl}">
								<img src="{ytcms-Search-List:Pic}" alt="{ytcms-Search-List:Name}" />
								<div id="radius">
									<img src="{ytcms:$StylePath}/img/vod.png" alt="" />
								</div>
								<span class="statusIco zbz2" rowspan="2"
									style="font-size: 12px;">{ytcms-Search-List:Rand}人观看</span>
							</a>
							<h2 style="font-size: 14px;">{ytcms-Search-List:Name}}</h2>
						</li>
						{/ytcms-Search-List}
					</ul>
					<div class="pagination" id="wr-page">
						<script src="{ytcms:$StylePath}/js/jQuery.js"></script>
						<script src="{ytcms:$StylePath}/js/page.js?t=1"></script>
						<script type="text/javascript">
							$("#wr-page").wrpage({
								pagesize: '{ytcms-Search-List:totalPage}',
								wr_current: '{ytcms-Search-List:currentPage}',
								baseUrl: '{ytcms-Search-List:baseUrl}',
							})
						</script>
					</div>
				</div>
			</div>

		</div>
		<div id="foot">
			{ytcms-include:Footer}
		</div>
	</body>
</html>

<style>
	.pagination {
		height: 32px;
		line-height: 32px;
		margin-bottom: 20px;
		margin-top: 20px;
		text-align: center
	}

	.pagination a {
		background-color: #f1f1f1;
		color: #777;
		display: inline-block;
		margin-right: 2px;
		padding: 0 12px
	}

	.pagination a:hover,
	.pagination strong {
		background-color: #ff5757;
		color: #fff;
		text-shadow: 1px 1px 1px #ff5757
	}

	.pagination strong {
		display: inline-block;
		font-weight: 400;
		height: 32px;
		line-height: 32px;
		margin-right: 2px;
		padding: 0 12px
	}

	.pagination a,
	.pagination strong {
		border-radius: 3px
	}

	@media (min-width:769px) {
		.pagination a.hidden-xs {
			display: inline-block
		}

		.pagination a.visible-xs {
			display: none
		}
	}

	@media (max-width:769px) {
		.pagination a.hidden-xs {
			display: none
		}

		.pagination a.visible-xs {
			display: inline-block
		}
	}

	@media (max-width:328px) {
		.pagination a {
			background-color: #f1f1f1;
			color: #777;
			display: inline-block;
			margin-right: 2px;
			padding: 0 10px
		}
	}
</style>
