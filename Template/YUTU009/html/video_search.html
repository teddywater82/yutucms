<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="renderer" content="webkit">
		<meta name="applicable-device" content="pc,mobile">
		<title>{ytcms:$WebTitle}-{ytcms-Search-List:Title}</title>
		<meta name="author" content="{ytcms:$WebTitle}">
		<meta name="keywords" content="{ytcms:$WebKeywords},{ytcms-Search-List:Title}">
		<meta name="description" content="{ytcms:$WebDescription},{ytcms-Search-List:Title}">
		<link rel="stylesheet" href="{ytcms:$StylePath}/css/ate.css" />
		<link rel="stylesheet" href="{ytcms:$StylePath}/css/zui.css" />
	<body>
		<div class="content">
			<div class="container">
				{ytcms-include:Header}
				<div class="appel">
					{ytcms-TAd}
					<p style="margin:5px 0;"><a href="{ytcms-TAd:Url}" target="_blank"><img src="{ytcms-TAd:Pic}"
								style="width:{ytcms-TAd:Width};height:{ytcms-TAd:Height};"></a></p>
					{/ytcms-TAd}
					<div class="mhlleset clearfix">
						<div class="mhlleset-main">
							<div class="appel-heading clearfix">
								<h3 class="appel-title">{ytcms-Search-List:Title}</h3>
							</div>
							<ul class="thumbnail-group clearfix">
								{ytcms-Search-List:Count=12}
								<li>
									<a class="thumbnail" href="{ytcms-Search-List:DUrl}" target="_blank"><img class="loadi"
											data-original="{ytcms-Search-List:Pic}" src="{ytcms-Search-List:Pic}" style="display: block;"><span
											class="video-grade"></span></a>
									<div class="video-info">
										<h5><a href="{ytcms-Search-List:DUrl}" target="_blank">{ytcms-Video-List:Name}</a></h5>
										<p class="vodtitle"><span class="title">
												观看: {ytcms-Search-List:Rand}</span></p>
									</div>
								</li>
								{/ytcms-Search-List}
								<div class="pagination" id="wr-page">
									<script src="{ytcms:$StylePath}/js/jQuery.js"></script>
									<script src="{ytcms:$StylePath}/js/page.js?t=1"></script>
									<script type="text/javascript">
										$("#wr-page").wrpage({
											pagesize: '{ytcms-Search-List:totalPage}',
											wr_current: '{ytcms-Search-List:currentPage}',
											baseUrl: '{ytcms-Search-List:baseUrl}',
										})
									</script>
								</div>
							</ul>
						</div>
					</div>
				</div>
				{ytcms-include:Footer}
			</div>
		</div>
	</body>
</html>
<style>
	.pagination {
		height: 32px;
		line-height: 32px;
		margin-bottom: 20px;
		margin-top: 20px;
		text-align: center
	}

	.pagination a {
		background-color: #f1f1f1;
		color: #777;
		display: inline-block;
		margin-right: 2px;
		padding: 0 12px;
		font-size: 16px;
	}

	.pagination a:hover,
	.pagination strong {
		background-color: #ff5757;
		color: #fff;
		text-shadow: 1px 1px 1px #ff5757
	}

	.pagination strong {
		display: inline-block;
		font-weight: 400;
		height: 32px;
		line-height: 32px;
		margin-right: 2px;
		padding: 0 12px;
	}

	.pagination a,
	.pagination strong {
		border-radius: 3px
	}

	@media (min-width:769px) {
		.pagination a.hidden-xs {
			display: inline-block
		}

		.pagination a.visible-xs {
			display: none
		}
	}

	@media (max-width:769px) {
		.pagination a.hidden-xs {
			display: none
		}

		.pagination a.visible-xs {
			display: inline-block
		}
	}

	@media (max-width:328px) {
		.pagination a {
			background-color: #f1f1f1;
			color: #777;
			display: inline-block;
			margin-right: 2px;
			padding: 0 10px
		}
	}
</style>
