<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="renderer" content="webkit">
		<meta name="applicable-device" content="pc,mobile">
		<title>{ytcms:$WebTitle}-{ytcms-Search-List:Title}</title>
		<meta name="author" content="{ytcms:$WebTitle}">
		<meta name="keywords" content="{ytcms:$WebKeywords},{ytcms-Search-List:Title}">
		<meta name="description" content="{ytcms:$WebDescription},{ytcms-Search-List:Title}">
		<link rel="stylesheet" href="{ytcms:$StylePath}/css/style.css">
		<link id="layuicss-laydate" rel="stylesheet" href="{ytcms:$StylePath}/css/laydate.css" media="all">
		<link id="layuicss-layer" rel="stylesheet" href="{ytcms:$StylePath}/css/layer3.1.1.css" media="all">
		<link id="layuicss-skincodecss" rel="stylesheet" href="{ytcms:$StylePath}/css/code.css" media="all">
		<link href="{ytcms:$StylePath}/css/layer.css" type="text/css" rel="styleSheet" id="layermcss">
		<style>
			.soso button svg {
				fill: #eb8787;
			}

			.nav a {
				background-color: #eb8787;
			}


			.links a {
				background: #ffe8e8;
				color: #000000;
			}

			.links {
				border: 1px solid #eb8787;
			}

			.title a {
				background-color: #eb8787;
			}

			.title {
				background-color: #eb8787;
			}

			.label1 a {
				align-items: center;
				background-color: #4260a4;
				border-radius: 4px;
				color: #fffbfb;
				display: inline-flex;
				font-size: 1.35rem;
				height: 2em;
				justify-content: center;
				line-height: 1.5;
				padding-left: .75em;
				padding-right: .75em;
				white-space: nowrap;
				margin-bottom: 3px;
				margin-right: 3px;
			}

			.label2 a {
				align-items: center;
				background-color: #fff;
				border-radius: 4px;
				color: #333;
				display: inline-flex;
				font-size: 0.75rem;
				height: 2em;
				justify-content: center;
				line-height: 1.5;
				padding-left: .75em;
				padding-right: .75em;
				white-space: nowrap;
				margin-bottom: 3px;
				margin-right: 3px;
				border: 1px solid #eb8787;
			}

			@media screen and (max-width:750px) {

				.header {
					display: contents;
				}

				.logo {
					font-size: 14px;
					margin-top: 10px;
				}
			}
		</style>
	</head>
	<body>
		<div id="app">
			{ytcms-include:Header}
			{ytcms-TAd}
			<p style="margin:5px 0;"><a href="{ytcms-TAd:Url}" target="_blank"><img src="{ytcms-TAd:Pic}"
						style="width:{ytcms-TAd:Width};height:{ytcms-TAd:Height};"></a></p>
			{/ytcms-TAd}
			<div class="box">
				<div class="title">
					<h3>{ytcms-Search-List:Title}</h3>
				</div>
				<div class="vods">
					{ytcms-Search-List:Count=20}
					<div class="vod">
						<div class="vod-img">
							<a href="{ytcms-Search-List:DUrl}" target="_blank">
								<img class="lazy" data-original="{ytcms-Search-List:Pic}" src="{ytcms-Search-List:Pic}" />
							</a>
						</div>
						<div class="vod-txt">
							<a href="{ytcms-Search-List:DUrl}" target="_blank">{ytcms-Search-List:Name}</a>
						</div>
					</div>
					{/ytcms-Search-List}
				</div>
				<div class="pagination" id="wr-page">
					<script src="{ytcms:$StylePath}/js/jQuery.js"></script>
					<script src="{ytcms:$StylePath}/js/page.js?t=1"></script>
					<script type="text/javascript">
						$("#wr-page").wrpage({
							pagesize: '{ytcms-Search-List:totalPage}',
							wr_current: '{ytcms-Search-List:currentPage}',
							baseUrl: '{ytcms-Search-List:baseUrl}',
						})
					</script>
				</div>
			</div>
			{ytcms-include:Footer}
		</div>
	</body>
</html>

<style>
	.pagination {
		height: 32px;
		line-height: 32px;
		margin-bottom: 20px;
		margin-top: 20px;
		text-align: center
	}

	.pagination a {
		background-color: #f1f1f1;
		color: #777;
		display: inline-block;
		margin-right: 2px;
		padding: 0 12px;
		font-size: 16px;
	}

	.pagination a:hover,
	.pagination strong {
		background-color: #ff5757;
		color: #fff;
		text-shadow: 1px 1px 1px #ff5757
	}

	.pagination strong {
		display: inline-block;
		font-weight: 400;
		height: 32px;
		line-height: 32px;
		margin-right: 2px;
		padding: 0 12px;
	}

	.pagination a,
	.pagination strong {
		border-radius: 3px
	}

	@media (min-width:769px) {
		.pagination a.hidden-xs {
			display: inline-block
		}

		.pagination a.visible-xs {
			display: none
		}
	}

	@media (max-width:769px) {
		.pagination a.hidden-xs {
			display: none
		}

		.pagination a.visible-xs {
			display: inline-block
		}
	}

	@media (max-width:328px) {
		.pagination a {
			background-color: #f1f1f1;
			color: #777;
			display: inline-block;
			margin-right: 2px;
			padding: 0 10px
		}
	}
</style>
