<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>{ytcms:$WebTitle}-{ytcms-Video-List:Title}</title>
		<meta name="author" content="{ytcms:$WebTitle}">
		<meta name="keywords" content="{ytcms:$WebKeywords},{ytcms-Video-List:Title}">
		<meta name="description" content="{ytcms:$WebDescription},{ytcms-Video-List:Title}">
		<link id="layuicss-laydate" rel="stylesheet" href="{ytcms:$StylePath}/css/app.css" media="all">
		<script src='{ytcms:$StylePath}/js/jquery.min.js'></script>
	</head>
	<body>
		{ytcms-include:Header}
		<div class="is-home pb-4">
			<div class="sm:container mx-auto mb-4 px-4">
				{ytcms-TAd}
				<p style="margin:5px 0;"><a href="{ytcms-TAd:Url}" target="_blank"><img src="{ytcms-TAd:Pic}"
							style="width:{ytcms-TAd:Width};"></a></p>
				{/ytcms-TAd}
				<div class="sm:container mx-auto px-4">
					<div style="text-align: center;margin-top:2rem;">
						<h6 class="sub-title mb-1" style="line-height: 1;font-size: .8750625rem;font-weight: 500;color: #edeeef;">分类
						</h6>
						<h1 class="text-center text-2xl text-nord4" style="color: #edeeef;font-size: 1.86875rem;font-weight: 700;margin-bottom: .25rem;">{ytcms-Video-List:Title}</h1> 
					</div>
					<div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-5">
						{ytcms-Video-List:Count=20}
						<div class="thumbnail group"> <a href="{ytcms-Video-List:DUrl}" class="text-secondary group-hover:text-primary">
								<div class="relative aspect-w-16 aspect-h-9 rounded overflow-hidden shadow-lg"> <img
										class="lozad w-full" data-src="{ytcms-Video-List:Pic}" src="{ytcms-Video-List:Pic}" alt="{ytcms-Video-List:Name}">
									<span
										class="absolute bottom-1 right-1 rounded-lg px-2 py-1 text-xs text-nord5 bg-red-800 bg-opacity-75 box-tag vip">{ytcms-Index-Type:1}</span>
									<span
										class="absolute bottom-1 left-1 rounded-lg px-2 py-1 text-xs text-nord5 bg-red-800 bg-opacity-75">{ytcms-Video-List:Title}</span>
								</div>
								<div class="my-2 text-sm text-nord4 truncate title">{ytcms-Video-List:Name}</div>
							</a>
						</div>
						{/ytcms-Video-List}
					</div>
					<div class="pagina" id="wr-page">
						<script src="{ytcms:$StylePath}/js/jQuery.js"></script>
						<script src="{ytcms:$StylePath}/js/page.js?t=1"></script>
						<script type="text/javascript">
							$("#wr-page").wrpage({
								pagesize: '{ytcms-Video-List:totalPage}',
								wr_current: '{ytcms-Video-List:currentPage}',
								baseUrl: '{ytcms-Video-List:baseUrl}',
							})
						</script>
					</div>
				</div>
			</div>
		</div>
		{ytcms-include:Footer}
	</body>
</html>
<style type="text/css">
	.pagina {
		text-align: center;
	}

	.pagina a {
		background-color: #f1f1f1;
		color: #777;
		display: inline-block;
		margin-right: 2px;
		padding: 0 12px
	}

	.pagina a:hover,
	.pagina strong {
		background-color: #ff5757;
		color: #fff;
		text-shadow: 1px 1px 1px #ff5757
	}

	.pagina strong {
		display: inline-block;
		font-weight: 400;
		height: 32px;
		line-height: 32px;
		margin-right: 2px;
		padding: 0 12px
	}

	.pagina a,
	.pagina strong {
		border-radius: 3px
	}

	@media (min-width:769px) {
		.pagina a.hidden-xs {
			display: inline-block
		}

		.pagina a.visible-xs {
			display: none
		}
	}

	@media (max-width:769px) {
		.pagina a.hidden-xs {
			display: none
		}

		.pagina a.visible-xs {
			display: inline-block
		}
	}

	@media (max-width:328px) {
		.pagina a {
			background-color: #f1f1f1;
			color: #777;
			display: inline-block;
			margin-right: 2px;
			padding: 0 10px
		}
	}
</style>
